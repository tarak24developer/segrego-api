spring.application.name=segrego-backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3307/segrego_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

server.port=${PORT:8080}

app.jwt.secret=${APP_JWT_SECRET:U2VncmVHb1NlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbjEyMzQ1Njc4OTA=}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}
app.seed-data=${APP_SEED_DATA:false}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
