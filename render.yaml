services:
  - type: web
    name: segrego-api
    runtime: docker
    plan: free
    rootDir: .
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:h2:mem:segrego;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
      - key: SPRING_DATASOURCE_USERNAME
        value: sa
      - key: SPRING_DATASOURCE_PASSWORD
        value: ""
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false
      - key: APP_SEED_DATA
        value: false
