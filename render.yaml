services:
  - type: web
    name: segrego-api
    runtime: java
    plan: free
    rootDir: .
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/segrego-backend-0.0.1-SNAPSHOT.jar"
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: APP_JWT_SECRET
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: SPRING_JPA_SHOW_SQL
        value: false
      - key: APP_SEED_DATA
        value: false
